name: mongo-sharding-repl
services:
  configSrv:
    container_name: configSrv
    image: mongo
    command: mongod --configsvr --replSet config_server --bind_ip_all --port 27017 --dbpath /data/db
    restart: always


    ports:
      - "27017:27017"
    volumes:
      - cfg-data:/data/db
      - ./scripts:/scripts
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  mongo_shard1a:
    container_name: mongo_shard1a
    image: mongo
    command: mongod --shardsvr --replSet shard1rs --bind_ip_all --port 27017 --dbpath /data/db


    ports:
      - "27018:27017"
    volumes:
      - shard1a-data:/data/db
      - ./scripts:/scripts
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s


  mongo_shard2a:
    container_name: mongo_shard2a
    image: mongo
    command: mongod --shardsvr --replSet shard2rs --bind_ip_all --port 27017 --dbpath /data/db

    ports:
      - "27019:27017"
    volumes:
      - shard2a-data:/data/db
      - ./scripts:/scripts
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  mongo_shard1b:
    container_name: mongo_shard1b
    image: mongo
    command: mongod --shardsvr --replSet shard1rs --bind_ip_all --port 27017 --dbpath /data/db

    ports:
      - "27020:27017"
    volumes:
      - shard1b-data:/data/db
      - ./scripts:/scripts
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s


  mongo_shard2b:
    container_name: mongo_shard2b
    image: mongo
    command: mongod --shardsvr --replSet shard2rs --bind_ip_all --port 27017 --dbpath /data/db


    ports:
      - "27021:27017"
    volumes:
      - shard2b-data:/data/db
      - ./scripts:/scripts
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s


  mongo_shard1c:
    container_name: mongo_shard1c
    image: mongo
    command: mongod --shardsvr --replSet shard1rs --bind_ip_all --port 27017 --dbpath /data/db

    ports:
      - "27022:27017"
    volumes:
      - shard1c-data:/data/db
      - ./scripts:/scripts
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s


  mongo_shard2c:
    container_name: mongo_shard2c
    image: mongo
    command: mongod --shardsvr --replSet shard2rs --bind_ip_all --port 27017 --dbpath /data/db


    ports:
      - "27023:27017"
    volumes:
      - shard2c-data:/data/db
      - ./scripts:/scripts
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s


  mongos_router:
    image: mongo
    container_name: mongos_router
    restart: always
    ports:
      - "27025:27017"
    volumes:
      - ./scripts:/scripts
    command:  mongos --configdb config_server/configSrv:27017 --port 27017 -bind_ip_all
    healthcheck:
      test: ["CMD", "mongo", "--eval","db.adminCommand('ping')"]
      interval: 5s
      start_period: 10s

  redis:
    image: "redis:latest"
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:rw
    command: [ "redis-server", "/usr/local/etc/redis/redis.conf" ]
    environment:
      REDIS_PASSWORD: "Aa123456"

  pymongo_api:
    container_name: pymongo_api
    build: 
      context: api_app
      dockerfile: Dockerfile
    image: kazhem/pymongo_api:1.0.0
    depends_on:
      - configSrv
      - mongos_router
      - mongo_shard1a
      - mongo_shard1b
      - mongo_shard1c
      - mongo_shard2a
      - mongo_shard2b
      - mongo_shard2c
    ports:
      - "8080:8080"
    environment:
      MONGODB_URL: "mongodb://mongos_router:27017"
      MONGODB_DATABASE_NAME: "somedb"
      REDIS_URL: "redis://default:Aa12345678@redis:6379"




networks:
  app-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 177.17.0.0/16

volumes:
  cfg-data: {}
  shard1a-data: {}
  shard2a-data: {}
  shard1b-data: { }
  shard2b-data: { }
  shard1c-data: { }
  shard2c-data: { }
  redis_data: {}
