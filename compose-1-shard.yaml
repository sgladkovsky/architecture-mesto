name: mesto
services:
  configSrv:
    container_name: configSrv
    image: mongo
    command: mongod --configsvr --replSet config_server --bind_ip_all --port 27017 --dbpath /data/db
    restart: always
    networks:
      app-network:
        ipv4_address: 177.17.0.17

    ports:
      - "27017:27017"
    volumes:
      - cfg-data:/data/db
      - ./scripts:/scripts
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s

  mongo_shard1:
    container_name: mongo_shard1
    image: mongo
    command: mongod --shardsvr --replSet shard1rs --bind_ip_all --port 27018 --dbpath /data/db

    networks:
      app-network:
        ipv4_address: 177.17.0.18

    ports:
      - "27018:27018"
    volumes:
      - shard1-data:/data/db
      - ./scripts:/scripts
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s


  mongo_shard2:
    container_name: mongo_shard2
    image: mongo
    command: mongod --shardsvr --replSet shard2rs --bind_ip_all --port 27019 --dbpath /data/db

    networks:
      app-network:
        ipv4_address: 177.17.0.19

    ports:
      - "27019:27019"
    volumes:
      - shard2-data:/data/db
      - ./scripts:/scripts
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      start_period: 10s


  mongos_router:
    image: mongo
    container_name: mongos_router
    restart: always
    ports:
      - "27020:27020"
    volumes:
      - ./scripts:/scripts
    networks:
      app-network:
        ipv4_address: 177.17.0.20
    command:  mongos --configdb config_server/configSrv:27017 -bind_ip_all --port 27020
    healthcheck:
      test: ["CMD", "mongo", "--eval","db.adminCommand('ping')"]
      interval: 5s
      start_period: 10s


  pymongo_api:
    container_name: pymongo_api
    build: 
      context: api_app
      dockerfile: Dockerfile
    image: kazhem/pymongo_api:1.0.0
    depends_on:
      - configSrv
      - mongos_router
      - mongo_shard1
      - mongo_shard2
    networks:
      app-network:
        ipv4_address: 177.17.0.77
    ports:
      - "8080:8080"
    environment:
      MONGODB_URL: "mongodb://mongos_router:27020"
      MONGODB_DATABASE_NAME: "somedb"


networks:
  app-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 177.17.0.0/16

volumes:
  cfg-data: {}
  shard1-data: {}
  shard2-data: {}
